# ── Crelyzor CI/CD Pipeline ───────────────────────────────────────────────────
#
# Triggers:
#   push to main   → deploy to production
#   push to dev    → deploy to staging
#
# How it works:
#   1. TypeScript type-check (each repo, in parallel)
#   2. SSH into the VM
#   3. Run ./deploy.sh prod (or staging)
#
# Required GitHub Secrets (Settings → Secrets and variables → Actions):
#   VM_HOST              VM public IP or hostname
#   VM_USER              SSH user (e.g. ubuntu)
#   VM_SSH_KEY           Full private key content (the PEM, not path)
#   VM_WORKSPACE_PATH    Absolute path on VM (e.g. /home/ubuntu/crelyzor-workspace)

name: Deploy

on:
  push:
    branches:
      - main   # → production
      - dev    # → staging

jobs:

  # ── Type-check all three repos in parallel ───────────────────────────────
  typecheck-backend:
    name: Typecheck — backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crelyzor-backend
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: crelyzor-backend/pnpm-lock.yaml

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: TypeScript check
        run: pnpm tsc --noEmit


  typecheck-frontend:
    name: Typecheck — frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crelyzor-frontend
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: crelyzor-frontend/pnpm-lock.yaml

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: TypeScript check
        run: pnpm tsc -b --noEmit   # Vite uses project references (-b flag)


  typecheck-public:
    name: Typecheck — public
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crelyzor-public
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: crelyzor-public/pnpm-lock.yaml

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: TypeScript check
        run: pnpm tsc --noEmit


  # ── Deploy — only runs if all typechecks pass ─────────────────────────────
  deploy:
    name: Deploy — ${{ github.ref_name == 'main' && 'production' || 'staging' }}
    runs-on: ubuntu-latest
    needs: [typecheck-backend, typecheck-frontend, typecheck-public]

    # Only deploy from main or dev — not PRs or other branches
    if: github.ref_name == 'main' || github.ref_name == 'dev'

    environment:
      name: ${{ github.ref_name == 'main' && 'production' || 'staging' }}
      url: ${{ github.ref_name == 'main' && 'https://crelyzor.com' || 'https://staging.crelyzor.com' }}

    steps:
      - name: Determine environment
        id: env
        run: |
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "name=prod" >> $GITHUB_OUTPUT
          else
            echo "name=staging" >> $GITHUB_OUTPUT
          fi

      - name: SSH and deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            cd ${{ secrets.VM_WORKSPACE_PATH }}
            ./deploy.sh ${{ steps.env.outputs.name }}
