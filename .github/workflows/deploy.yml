# ── Crelyzor Workspace CI/CD ───────────────────────────────────────────────────
#
# This repo holds infra only (docker-compose, nginx, deploy.sh).
# App repos (backend, frontend, public) have their own deploy.yml with
# typechecks. This workflow just deploys when infra config changes.
#
# Triggers:
#   push to main      → deploy to production
#   push to staging   → deploy to staging
#
# Required GitHub Secrets (Settings → Secrets and variables → Actions):
#   VM_HOST              VM public IP or hostname
#   VM_USER              SSH user (e.g. ubuntu)
#   VM_SSH_KEY           Full private key content (the PEM, not path)
#   VM_WORKSPACE_PATH    Absolute path on VM (e.g. /home/ubuntu/crelyzor-workspace)

name: Deploy

on:
  push:
    branches:
      - main      # → production
      - staging   # → staging

jobs:
  deploy:
    name: Deploy — ${{ github.ref_name == 'main' && 'production' || 'staging' }}
    runs-on: ubuntu-latest

    environment:
      name: ${{ github.ref_name == 'main' && 'production' || 'staging' }}
      url: ${{ github.ref_name == 'main' && 'https://crelyzor.app' || 'https://staging.crelyzor.app' }}

    steps:
      - name: Determine environment
        id: env
        run: |
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "name=prod" >> $GITHUB_OUTPUT
          else
            echo "name=staging" >> $GITHUB_OUTPUT
          fi

      - name: SSH and deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            cd ${{ secrets.VM_WORKSPACE_PATH }}
            ./deploy.sh ${{ steps.env.outputs.name }}
