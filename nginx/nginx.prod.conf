# ── Production Nginx config ───────────────────────────────────────────────────
# Domains:
#   crelyzor.app              → public  (Next.js, port 5174)
#   platform.crelyzor.app     → frontend (Vite SPA, port 5173)
#   api.crelyzor.app          → backend (Express, port 4000)

worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  keepalive_timeout 65;

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent"';
  access_log /var/log/nginx/access.log main;
  error_log  /var/log/nginx/error.log warn;

  gzip on;
  gzip_types text/plain text/css application/json application/javascript
             text/xml application/xml application/xml+rss text/javascript;

  # Use Docker's internal DNS so upstream IPs are re-resolved after container restarts
  resolver 127.0.0.11 valid=10s;

  # ── Redirect HTTP → HTTPS ─────────────────────────────────────────────────
  server {
    listen 80;
    server_name crelyzor.app platform.crelyzor.app api.crelyzor.app;
    return 301 https://$host$request_uri;
  }

  # ── Public site — crelyzor.app ────────────────────────────────────────────
  server {
    listen 443 ssl;
    server_name crelyzor.app;

    ssl_certificate     /etc/letsencrypt/live/crelyzor.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/crelyzor.app/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    location / {
      set $upstream http://public:5174;
      proxy_pass         $upstream;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade $http_upgrade;
      proxy_set_header   Connection 'upgrade';
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_cache_bypass $http_upgrade;
    }
  }

  # ── Dashboard — platform.crelyzor.app ────────────────────────────────────
  server {
    listen 443 ssl;
    server_name platform.crelyzor.app;

    ssl_certificate     /etc/letsencrypt/live/platform.crelyzor.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/platform.crelyzor.app/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    location / {
      set $upstream http://frontend:5173;
      proxy_pass         $upstream;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade $http_upgrade;
      proxy_set_header   Connection 'upgrade';
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_cache_bypass $http_upgrade;
    }
  }

  # ── API — api.crelyzor.app ────────────────────────────────────────────────
  server {
    listen 443 ssl;
    server_name api.crelyzor.app;

    ssl_certificate     /etc/letsencrypt/live/platform.crelyzor.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/platform.crelyzor.app/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 500M;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;

    location / {
      set $upstream http://backend:4000;
      proxy_pass         $upstream;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade $http_upgrade;
      proxy_set_header   Connection 'upgrade';
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_cache_bypass $http_upgrade;
    }
  }
}
