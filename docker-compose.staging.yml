services:

  # ── Database ────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: crelyzor
      POSTGRES_USER: crelyzor
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crelyzor"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"


  # ── Redis (job queues + caching) ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru --save ""
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"


  # ── Backend API ──────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./crelyzor-backend
    restart: always
    env_file: ./crelyzor-backend/.env.staging
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
    expose:
      - "4000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:4000/',r=>process.exit(0)).on('error',()=>process.exit(1))\""]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"


  # ── Bull Worker ──────────────────────────────────────────────────────────────
  worker:
    build:
      context: ./crelyzor-backend    # same image as backend
    command: node dist/worker.js     # different entry point
    restart: always
    env_file: ./crelyzor-backend/.env.staging
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"


  # ── Dashboard (Vite static) ──────────────────────────────────────────────────
  frontend:
    build:
      context: ./crelyzor-frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
        VITE_CARDS_PUBLIC_URL: ${VITE_CARDS_PUBLIC_URL}
    restart: always
    networks:
      - internal
    expose:
      - "5173"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5173/ >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 6
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: "0.15"


  # ── Public site (Next.js) ────────────────────────────────────────────────────
  public:
    build:
      context: ./crelyzor-public
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
        NEXT_PUBLIC_BASE_URL: ${NEXT_PUBLIC_BASE_URL}
    restart: always
    networks:
      - internal
    expose:
      - "5174"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:5174/',r=>process.exit(0)).on('error',()=>process.exit(1))\""]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.3"


  # ── Nginx (reverse proxy + SSL) ──────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.staging.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
      public:
        condition: service_healthy
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: "0.15"


volumes:
  postgres_data:
  redis_data:

networks:
  internal:
    driver: bridge
