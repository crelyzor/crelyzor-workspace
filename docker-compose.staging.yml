services:

  # ── Database ────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: crelyzor
      POSTGRES_USER: crelyzor
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crelyzor"]
      interval: 5s
      timeout: 5s
      retries: 5


  # ── Backend API ──────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./crelyzor-backend
    restart: always
    env_file: ./crelyzor-backend/.env.staging
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
    expose:
      - "3000"


  # ── Bull Worker ──────────────────────────────────────────────────────────────
  worker:
    build:
      context: ./crelyzor-backend
    command: node dist/worker.js
    restart: always
    env_file: ./crelyzor-backend/.env.staging
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal


  # ── Dashboard (Vite static) ──────────────────────────────────────────────────
  frontend:
    build:
      context: ./crelyzor-frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
        VITE_CARDS_PUBLIC_URL: ${VITE_CARDS_PUBLIC_URL}
    restart: always
    networks:
      - internal
    expose:
      - "5173"


  # ── Public site (Next.js) ────────────────────────────────────────────────────
  public:
    build:
      context: ./crelyzor-public
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
        NEXT_PUBLIC_BASE_URL: ${NEXT_PUBLIC_BASE_URL}
    restart: always
    networks:
      - internal
    expose:
      - "5174"


  # ── Nginx (reverse proxy + SSL) ──────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.staging.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
      - frontend
      - public
    networks:
      - internal


volumes:
  postgres_data:

networks:
  internal:
    driver: bridge
